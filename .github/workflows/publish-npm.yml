name: Publish to npm

on:
  release:
    types:
      - published

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Read package metadata
        id: package
        shell: bash
        run: |
          echo "name=$(node -p "require('./package.json').name")" >> "$GITHUB_OUTPUT"
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Check npm for existing version
        id: version_check
        shell: bash
        run: |
          if npm view "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}" version >/dev/null 2>&1; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "Version ${{ steps.package.outputs.version }} already exists in npm. Skipping publish."
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "Version ${{ steps.package.outputs.version }} not found in npm. Publish enabled."
          fi

      - name: Install dependencies
        if: steps.version_check.outputs.should_publish == 'true'
        run: npm ci

      - name: Run tests
        if: steps.version_check.outputs.should_publish == 'true'
        run: npm test

      - name: Build package
        if: steps.version_check.outputs.should_publish == 'true'
        run: npm run build

      - name: Publish package
        if: steps.version_check.outputs.should_publish == 'true'
        run: npm publish --access public

      - name: Skip publish
        if: steps.version_check.outputs.should_publish != 'true'
        run: echo "npm publish skipped because this package version already exists."
